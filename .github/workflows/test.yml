name: Tests

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    # Install with --no-deps to skip minware-singer-utils (private repo).
    # Avoids needing a PAT with private repo access, which is a security
    # risk on public repos where forked PRs could exfiltrate the token.
    # tests/conftest.py provides stubs for the missing package.
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install --no-deps -e .
        pip install singer-python==6.1.0 requests==2.20.0 psutil==5.8.0
        pip install pytest

    - name: Run unit tests
      run: |
        python -m pytest tests/unittests/ -v --tb=short
